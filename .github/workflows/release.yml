name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Cache Nix store
        uses: DeterminateSystems/magic-nix-cache-action@main
        with:
          use-flakehub: false

      - name: Install dependencies
        run: nix develop .#ci --command uv sync --group dev

      - name: Run tests
        run: nix develop .#ci --command uv run pytest --tb=short -q

  build:
    name: Build
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Build package
        run: uv build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  release:
    name: GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Verify tag matches package version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(cat VERSION | tr -d '[:space:]')
          echo "Tag version: $TAG_VERSION"
          echo "Package version: $PKG_VERSION"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match package version ($PKG_VERSION)"
            exit 1
          fi

      - name: Verify CHANGELOG.md has entry for this version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if ! grep -q "## \[${TAG_VERSION}\]" CHANGELOG.md; then
            echo "::error::CHANGELOG.md has no entry for version ${TAG_VERSION}"
            exit 1
          fi

      - name: Extract release notes from CHANGELOG.md
        id: changelog
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          python3 scripts/generate_release_notes.py \
            --from-changelog \
            --version "$TAG_VERSION" \
            --output release-notes.md
          echo "Generated release-notes.md for v${TAG_VERSION}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          body_path: release-notes.md
          draft: false
          prerelease: ${{ contains(github.ref_name, 'rc') || contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') }}
