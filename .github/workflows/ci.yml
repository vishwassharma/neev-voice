name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Cache Nix store
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Install dependencies
        run: nix develop .#ci --command uv sync --group dev --python ${{ matrix.python-version }}

      - name: Run linter
        run: nix develop .#ci --command uv run ruff check src/ tests/

      - name: Run type checker
        run: nix develop .#ci --command uv run mypy src/neev_voice/

      - name: Run tests
        run: nix develop .#ci --command uv run pytest --tb=short -q

      - name: Security audit
        run: nix develop .#ci --command uvx pip-audit
